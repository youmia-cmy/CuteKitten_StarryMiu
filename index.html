<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StarryMiu NFT Terminal</title>
<!-- 设备检测和重定向 -->
<script>
(function() {
  // 检测是否为移动设备
  function isMobile() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
           (window.innerWidth <= 768 && 'ontouchstart' in window);
  }

  // 如果是移动设备，跳转到移动端页面
  if (isMobile() && !window.location.href.includes('mobile.html')) {
    window.location.href = 'mobile.html';
  }
})();
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* === RESET & BASE === */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a0f;--term-bg:#0d0d14;--text-primary:#c0ffc0;--text-dim:#4a7a4a;
  --accent-cyan:#00f0ff;--accent-magenta:#ff00e5;--accent-purple:#a855f7;
  --accent-green:#39ff14;--grad-1:linear-gradient(135deg,#00f0ff,#a855f7,#ff00e5);
  --grad-2:linear-gradient(90deg,#00f0ff,#39ff14);--grad-3:linear-gradient(45deg,#ff00e5,#ff6b35,#ffd700);
  --font-mono:'JetBrains Mono','Share Tech Mono',monospace;
  --scanline:rgba(0,240,255,0.03);
}
html{font-size:14px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text-primary);font-family:var(--font-mono);overflow-x:hidden;min-height:100vh}

/* === SCANLINE OVERLAY === */
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);
  animation:scanFlicker 8s infinite}
@keyframes scanFlicker{0%,100%{opacity:.4}50%{opacity:.6}}

/* === CRT GLOW === */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
  background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.6) 100%)}

/* === NAVIGATION === */
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;
  background:rgba(10,10,15,0.95);backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(0,240,255,0.15);padding:0 2rem;height:56px;
  display:flex;align-items:center;justify-content:space-between}
.nav-logo{font-size:1.1rem;font-weight:700;letter-spacing:2px;
  background:var(--grad-1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-logo span{font-weight:300;opacity:.6;-webkit-text-fill-color:var(--text-dim)}
.nav-links{display:flex;gap:0}
.nav-link{padding:1rem 1.5rem;cursor:pointer;font-size:.85rem;letter-spacing:1px;
  color:var(--text-dim);border:none;background:none;font-family:var(--font-mono);
  transition:all .3s;position:relative;text-transform:uppercase}
.nav-link:hover{color:var(--text-primary)}
.nav-link.active{color:var(--accent-cyan)}
.nav-link.active::after{content:'';position:absolute;bottom:0;left:1rem;right:1rem;height:2px;
  background:var(--grad-1);border-radius:1px}
.nav-link::before{content:'>';position:absolute;left:4px;opacity:0;color:var(--accent-green);
  transition:opacity .2s}
.nav-link:hover::before,.nav-link.active::before{opacity:1}

/* === PAGES === */
.page{display:none;padding-top:72px;min-height:100vh;padding-bottom:3rem;padding-left:2.5rem;padding-right:2.5rem}
.page.active{display:flex;flex-direction:column;animation:fadeIn .5s ease}
.page.active.page-center{justify-content:center;align-items:center}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* === TERMINAL WINDOW === */
.terminal{margin:1.5rem auto;max-width:1400px;border-radius:12px;overflow:visible;position:relative;
  background:var(--term-bg);border:2px solid transparent;
  background-clip:padding-box;
  animation:termGlow 4s ease-in-out infinite alternate}
.terminal>*{position:relative;z-index:2}
.terminal>.terminal-body,.terminal>.terminal-header,.terminal>.exhibit-desc,.terminal>.pagination{
  background:var(--term-bg)}
@keyframes termGlow{
  0%{box-shadow:0 0 15px rgba(0,240,255,0.1),0 0 30px rgba(168,85,247,0.05)}
  33%{box-shadow:0 0 15px rgba(168,85,247,0.15),0 0 30px rgba(255,0,229,0.05)}
  66%{box-shadow:0 0 15px rgba(255,0,229,0.1),0 0 30px rgba(57,255,20,0.05)}
  100%{box-shadow:0 0 15px rgba(57,255,20,0.1),0 0 30px rgba(0,240,255,0.05)}
}
.terminal::before{content:'';position:absolute;inset:-2px;border-radius:14px;padding:2px;
  background:linear-gradient(var(--border-angle,0deg),#00f0ff,#a855f7,#ff00e5,#39ff14,#00f0ff);
  background-size:300% 300%;
  animation:borderRotate 4s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1}
@keyframes borderRotate{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}
@property --border-angle{syntax:'<angle>';initial-value:0deg;inherits:false}
.terminal-header{background:rgba(0,0,0,0.5);padding:.6rem 1rem;display:flex;align-items:center;gap:.5rem;
  border-bottom:1px solid rgba(0,240,255,0.1);position:relative;overflow:hidden}
.terminal-header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,#00f0ff,#a855f7,#ff00e5,#39ff14,#00f0ff);
  background-size:300% 100%;animation:headerGlow 3s linear infinite}
@keyframes headerGlow{0%{background-position:0% 0}100%{background-position:300% 0}}
.terminal-dot{width:10px;height:10px;border-radius:50%}
.terminal-dot.r{background:#ff5f56}.terminal-dot.y{background:#ffbd2e}.terminal-dot.g{background:#27c93f}
.terminal-title{margin-left:.8rem;font-size:.75rem;color:var(--text-dim);letter-spacing:1px}
.terminal-body{padding:1.2rem 1.5rem;min-height:200px;position:relative}

/* === NFT GRID === */
.nft-grid{display:grid;grid-template-columns:repeat(10,1fr);gap:16px;padding:.8rem 0}
.nft-grid>div{display:flex;flex-direction:column;align-items:center;min-width:0}
.nft-grid .nft-card{width:100%;padding-top:100%;position:relative;overflow:hidden;border-radius:6px}
.nft-grid .nft-card .nft-img{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover}
.nft-card{position:relative;border-radius:6px;overflow:hidden;cursor:pointer;
  transition:transform .2s,box-shadow .2s;width:100%}
.nft-card::before{content:'';position:absolute;inset:-2px;border-radius:8px;padding:2px;
  background:linear-gradient(var(--border-angle,0deg),#00f0ff,#a855f7,#ff00e5,#39ff14,#00f0ff);
  background-size:300% 300%;animation:borderRotate 3s linear infinite;
  -webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);
  -webkit-mask-composite:xor;mask-composite:exclude;z-index:2;opacity:.7;transition:opacity .3s}
.nft-card:hover::before{opacity:1}
.nft-card:hover{transform:translateY(-3px);box-shadow:0 8px 25px rgba(0,240,255,0.15)}
.nft-img{width:100%;height:100%;object-fit:cover;border-radius:6px;display:block}
.nft-id{text-align:center;font-size:.65rem;color:var(--accent-cyan);padding:4px 0;
  letter-spacing:1px;font-weight:500}

/* === HOME PAGE COMMAND LINE === */
.cmd-line{display:flex;align-items:center;gap:.5rem;padding:.4rem 0}
.cmd-prompt{color:var(--accent-green);white-space:nowrap;font-weight:700}
.cmd-input{flex:1;background:none;border:none;color:var(--text-primary);font-family:var(--font-mono);
  font-size:.9rem;outline:none;caret-color:var(--accent-cyan)}
.cmd-output{padding:.3rem 0;line-height:1.7;color:var(--text-primary);white-space:pre-wrap}
.cmd-output.dim{color:var(--text-dim)}
.cmd-output .highlight{color:var(--accent-cyan)}
.cmd-output .warn{color:#ffd700}
.cmd-output .pink{color:var(--accent-magenta)}
.typing-cursor{display:inline-block;width:8px;height:16px;background:var(--accent-green);
  animation:blink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}
@keyframes blink{50%{opacity:0}}

/* === VOTE SECTION === */
.vote-btn{background:none;border:1px solid var(--accent-cyan);color:var(--accent-cyan);
  font-family:var(--font-mono);font-size:.6rem;padding:2px 8px;border-radius:3px;
  cursor:pointer;transition:all .2s;letter-spacing:.5px}
.vote-btn:hover{background:var(--accent-cyan);color:var(--bg)}
.vote-count{font-size:.6rem;color:var(--accent-magenta);text-align:center}

/* === PAGINATION === */
.pagination{display:flex;justify-content:center;align-items:center;gap:.6rem;padding:1rem 0;font-size:.85rem;user-select:none}
.page-btn{background:none;border:none;color:var(--text-dim);
  font-family:var(--font-mono);font-size:.85rem;padding:0;
  cursor:pointer;transition:all .2s}
.page-btn:hover{color:#fff}
.page-btn.active{color:#ffb0c4;font-weight:700}
.page-btn.nav-arrow{color:#ff3333;font-weight:700}
.page-btn.nav-arrow:hover{color:#ff6666;text-shadow:0 0 6px rgba(255,51,51,0.4)}
.page-btn.nav-arrow:disabled{color:#4a2020;cursor:default;text-shadow:none}
.page-info{color:var(--text-dim);font-size:.85rem;padding:0}

/* === ABOUT === */
.about-line{padding:.3rem 0;line-height:1.8}
.about-line .label{color:var(--text-dim)}
.about-line .value{color:var(--accent-cyan)}
.ascii-art{color:var(--accent-green);font-size:.7rem;line-height:1.3;padding:1rem 0;opacity:.8}

/* === STORY TERMINAL === */
.story-chapter{padding:1rem 0;border-bottom:1px solid rgba(0,240,255,0.06)}
.story-chapter:last-child{border-bottom:none}
.story-chapter-title{color:var(--accent-cyan);font-size:.8rem;font-weight:700;letter-spacing:1px;
  padding:.3rem 0;margin-bottom:.4rem}
.story-chapter-title .ch-num{color:var(--accent-magenta);margin-right:.5rem}
.story-divider{color:var(--text-dim);font-size:.7rem;opacity:.5;padding:.2rem 0;user-select:none}
.story-text{color:var(--text-primary);font-size:.8rem;line-height:2;padding:.2rem 0;white-space:pre-wrap}
.story-text .em{color:var(--accent-cyan)}
.story-text .warn{color:#ffd700}
.story-text .pink{color:var(--accent-magenta)}
.story-nav{display:flex;gap:.8rem;padding:1rem 0;flex-wrap:wrap}
.story-nav-btn{background:none;border:1px solid var(--text-dim);color:var(--text-dim);
  font-family:var(--font-mono);font-size:.7rem;padding:.3rem .8rem;border-radius:3px;
  cursor:pointer;transition:all .2s;letter-spacing:.5px}
.story-nav-btn:hover,.story-nav-btn.active{border-color:var(--accent-cyan);color:var(--accent-cyan);
  background:rgba(0,240,255,0.05)}
.story-cmd{color:var(--text-dim);font-size:.7rem;padding:.3rem 0}
.story-cmd .highlight{color:var(--accent-cyan)}

/* === EXHIBITION DESC === */
.exhibit-desc{padding:1.5rem;color:var(--text-dim);line-height:1.8;font-size:.85rem;
  border-top:1px solid rgba(0,240,255,0.08)}
.exhibit-desc .em{color:var(--accent-cyan)}

/* === SCROLLBAR === */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:rgba(0,240,255,0.2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,240,255,0.4)}

/* === RESPONSIVE === */
@media(max-width:1200px){.nft-grid{grid-template-columns:repeat(5,1fr)}}
@media(max-width:768px){
  .nav{padding:0 1rem}
  .nav-link{padding:.8rem .8rem;font-size:.75rem}
  .nft-grid{grid-template-columns:repeat(5,1fr);gap:6px}
  .terminal{margin:1rem .5rem}
}

/* === AMBIENT PARTICLES === */
.particle{position:fixed;width:2px;height:2px;background:var(--accent-cyan);border-radius:50%;
  pointer-events:none;z-index:0;opacity:0;animation:floatUp linear infinite}
@keyframes floatUp{0%{opacity:0;transform:translateY(100vh) scale(0)}
  10%{opacity:.6}90%{opacity:.4}100%{opacity:0;transform:translateY(-10vh) scale(1.5)}}

/* Top 10 NFT grid */
.nft-grid-top{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;padding:.5rem 0}
.nft-grid-top>div{display:flex;flex-direction:column;align-items:center;min-width:0}
.nft-grid-top .nft-card{width:100%;padding-top:100%;position:relative;overflow:hidden;border-radius:6px}
.nft-grid-top .nft-card .nft-img{position:absolute;inset:0;width:100%;height:100%;display:block;object-fit:cover}
</style>
</head>
<body>

<!-- NAVIGATION -->
<nav class="nav">
  <div class="nav-logo">STARRY_MIU <span>// NFT_TERMINAL v1.0</span></div>
  <div class="nav-links">

<!-- HOME PAGE -->
<div id="home" class="page active page-center">
  <div class="terminal" style="max-width:960px">

      <span class="terminal-title">starry_miu@nft-terminal:~$ cat about.txt</span>

<script>
/* ========== DATA ========== */
const TOTAL_NFT = 1132;
const PER_PAGE = 20;
const CONTRACT_ADDRESS = '0x88d1e3b2913f4c44436d2b21b154c90157b5d721';
const IPFS_CID = 'bafybeidcmp6jbjy2bqrj2xmemxme6bhmixtkkuwfq3gmgh34h7syclclqa';

// IPFS网关列表 - 主网关和备用网关
const gateways = [
  'https://dweb.link',           // 主
  'https://nftstorage.link',     // 备1
  'https://cloudflare-ipfs.com', // 备2
];

// 已销毁的NFT编号列表 - 黑洞销毁
const DESTROYED_NFTS = new Set([405, 439, 84, 561, 547, 1042, 688, 276, 930, 253, 764, 395, 582, 845, 603, 128, 608, 632, 529, 200, 446, 410, 380, 233, 986, 398, 32, 420, 961, 52, 66, 739, 654, 1041, 567, 46]);

// 获取NFT图片URL
function getNFTImageUrl(id) {
  return `${gateways[0]}/ipfs/${IPFS_CID}/${id}.webp`;
}

// 检查NFT是否已销毁
function isDestroyed(id) {
  return DESTROYED_NFTS.has(id);
}

// 计算实际页数（排除销毁的NFT）
function getAvailableNFTs() {
  const available = [];
  for (let i = 1; i <= TOTAL_NFT; i++) {
    if (!isDestroyed(i)) {
      available.push(i);
    }
  }
  return available;
}

const availableNFTs = getAvailableNFTs();
const TOTAL_PAGES = Math.ceil(availableNFTs.length / PER_PAGE);

const imageCache = {};
const nftDataCache = {};

// 创建NFT图片元素（带懒加载和网关切换）
function createNFTImage(id) {
  const img = document.createElement('img');
  img.className = 'nft-img';
  img.src = `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%231a1a2e' width='100' height='100'/><text fill='%234a4a6a' x='50' y='55' text-anchor='middle'>${id}</text></svg>`;
  img.alt = `StarryMiu #${id}`;
  img.loading = 'lazy';  // 关键！懒加载
  img.width = 400;      // 图片尺寸限制
  img.height = 400;     // 图片尺寸限制
  
  // 设置实际图片URL并添加网关切换机制
  img.setAttribute('data-src', getNFTImageUrl(id));
  
  // 懒加载观察者
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        loadNFTImage(img, id);
        observer.unobserve(img);
      }
    });
  }, { rootMargin: '100px' });
  
  observer.observe(img);
  
  return img;
}

// 加载NFT图片（带网关切换）
function loadNFTImage(img, id) {
  const currentGatewayIndex = 0;
  const src = img.getAttribute('data-src');
  
  img.src = src;
  
  img.onerror = function() {
    // 切换到下一个网关
    const currentUrl = this.src;
    for (let i = 0; i < gateways.length - 1; i++) {
      if (currentUrl.startsWith(gateways[i])) {
        this.src = currentUrl.replace(gateways[i], gateways[i + 1]);
        // 设置新的onerror继续切换
        this.onerror = function() {
          for (let j = i + 1; j < gateways.length - 1; j++) {
            if (this.src.startsWith(gateways[j])) {
              this.src = this.src.replace(gateways[j], gateways[j + 1]);
              this.onerror = null; // 最后一个网关失败后停止
              break;
            }
          }
        };
        break;
      }
    }
  };
}

// 获取NFT数据（简化版，不调用OpenSea API）
function getNFTData(id) {
  if (nftDataCache[id]) {
    return nftDataCache[id];
  }
  
  const result = {
    id: id,
    image_url: getNFTImageUrl(id),
    name: `StarryMiu #${id}`
  };
  nftDataCache[id] = result;
  return result;
}

// Generate deterministic NFT colors for placeholder images
function nftColor(id) {
  const h = (id * 137.508) % 360;
  return `hsl(${h},70%,45%)`;
}
function nftColorLight(id) {
  const h = (id * 137.508) % 360;
  return `hsl(${h},80%,65%)`;
}

// Generate SVG placeholder NFT image
function nftSVG(id) {
  const c1 = nftColor(id), c2 = nftColorLight(id);
  const face = ['=^.^=','(>ω<)','(=①ω①=)','(^・ω・^)','(=ΦωΦ=)','ฅ^•ﻌ•^ฅ','(=^-ω-^=)','(≧◡≦)','(=✪ᆺ✪=)','(ΦεΦ)'][id % 10];
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
    <defs><linearGradient id="g${id}" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="${c1}"/><stop offset="100%" stop-color="${c2}"/></linearGradient></defs>
    <rect width="200" height="200" fill="url(#g${id})" rx="8"/>
    <text x="100" y="90" text-anchor="middle" fill="white" font-size="14" font-family="monospace" opacity="0.9">${face}</text>
    <text x="100" y="130" text-anchor="middle" fill="white" font-size="22" font-weight="bold" font-family="monospace">#${String(id).padStart(4,'0')}</text>
  </svg>`;
  return 'data:image/svg+xml,' + encodeURIComponent(svg);
}

// Character data from jiaose.csv
const characters = [];

function parseCSV(data) {
  const lines = data.split('\n');
  const headers = lines[0].split(',');
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',');
    if (values.length >= 6) {
      characters.push({
        token_id: parseInt(values[0]),
        name: values[1],
        role_type: values[2],
        personality: values[3],
        skill: values[4],
        story: values.slice(5).join(',').trim()
      });
    }
  }
}

function loadCharacters() {
  fetch('jiaose.csv')

// Vote data
const votes = {};
const VOTE_CONFIG = {
  initialMin: 18,
  initialMax: 189,
  dailyMin: 15,
  dailyMax: 217
};
let lastVoteDate = '';
let votedNFTsToday = {};

function getClientIP() {
  return new Promise((resolve) => {
    fetch('https://api.ipify.org?format=json')
      .then(response => response.json())
      .then(data => resolve(data.ip || 'unknown'))
      .catch(() => resolve('unknown'));
  });
}

function getTodayString() {
  const now = new Date();
  return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
}

async function loadVotes() {
  try {
    const response = await fetch('votes.json');
    const data = await response.json();
    
    if (data.votes) {
      Object.assign(votes, data.votes);
    }
    
    lastVoteDate = data.lastUpdate || getTodayString();
    
    const today = getTodayString();
    if (lastVoteDate !== today) {
      applyDailyGrowth();
      lastVoteDate = today;
      saveVotes();
    }
    
    for (let i = 1; i <= TOTAL_NFT; i++) {
      if (votes[i] === undefined) {
        votes[i] = Math.floor(Math.random() * (VOTE_CONFIG.initialMax - VOTE_CONFIG.initialMin + 1)) + VOTE_CONFIG.initialMin;
      }
    }
  } catch (error) {
    console.error('Failed to load votes:', error);
    initVotes();
  }
}

function initVotes() {
  for (let i = 1; i <= TOTAL_NFT; i++) {
    votes[i] = Math.floor(Math.random() * (VOTE_CONFIG.initialMax - VOTE_CONFIG.initialMin + 1)) + VOTE_CONFIG.initialMin;
  }
  lastVoteDate = getTodayString();
  saveVotes();
}

function applyDailyGrowth() {
  for (let i = 1; i <= TOTAL_NFT; i++) {
    const growth = Math.floor(Math.random() * (VOTE_CONFIG.dailyMax - VOTE_CONFIG.dailyMin + 1)) + VOTE_CONFIG.dailyMin;
    votes[i] = (votes[i] || 0) + growth;
  }
}

function saveVotes() {
  const data = {
    version: "1.0",
    lastUpdate: lastVoteDate,
    dailyGrowth: {
      min: VOTE_CONFIG.dailyMin,
      max: VOTE_CONFIG.dailyMax
    },
    initialVotes: {
      min: VOTE_CONFIG.initialMin,
      max: VOTE_CONFIG.initialMax
    },
    votes: votes
  };
  
  fetch('votes.json', {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(data)
  }).catch(error => {
    console.error('Failed to save votes:', error);
  });
}

async function canVote(nftId) {
  const today = getTodayString();
  const ip = await getClientIP();
  
  if (!votedNFTsToday[ip]) {
    votedNFTsToday[ip] = [];
  }
  
  if (votedNFTsToday[ip].includes(nftId)) {
    return false;
  }
  
  return true;
}

async function addVote(nftId) {
  const today = getTodayString();
  const ip = await getClientIP();
  
  if (!votedNFTsToday[ip]) {
    votedNFTsToday[ip] = [];
  }
  
  if (votedNFTsToday[ip].includes(nftId)) {
    return false;
  }
  
  votes[nftId] = (votes[nftId] || 0) + 1;
  votedNFTsToday[ip].push(nftId);
  saveVotes();
  
  return true;
}

function typeCommand(prompt, text, idx) {
  if (idx === 0) {
    const existingLine = homeTerminal.querySelector('.cmd-line');
    if (existingLine) {
      existingLine.remove();
    }
  }
  
  const promptLine = homeTerminal.querySelector('.cmd-line');
  if (!promptLine) {
    const line = document.createElement('div');
    line.className = 'cmd-line';
    line.innerHTML = `<span class="cmd-prompt">${prompt}</span>`;
    homeTerminal.appendChild(line);
  }
  
  const line = homeTerminal.querySelector('.cmd-line');
  if (idx < text.length) {
    line.innerHTML = `<span class="cmd-prompt">${prompt}</span><span style="color:var(--text-primary)">${escapeHtml(text.substring(0, idx + 1))}</span>`;
    setTimeout(() => typeCommand(prompt, text, idx + 1), 30);
  } else {
    const input = document.createElement('input');
    input.className = 'cmd-input';
    input.setAttribute('autocomplete', 'off');
    input.setAttribute('autocorrect', 'off');
    input.setAttribute('autocapitalize', 'off');
    input.setAttribute('spellcheck', 'false');
    input.setAttribute('placeholder', '');
    input.style.caretColor = 'var(--accent-cyan)';
    input.addEventListener('keydown', handleCommand);
    input.addEventListener('keyup', handleTabComplete);
    line.innerHTML = `<span class="cmd-prompt">${prompt}</span>`;
    line.appendChild(input);
    input.focus();
  }
  homeTerminal.scrollTop = homeTerminal.scrollHeight;
}

}

function handleTabComplete(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
  }
}

function handleCommand(e) {
  if (isProcessing && e.key !== 'Enter') return;

  if (e.key === 'Enter' && !isProcessing) {
    isProcessing = true;
    const input = e.target;
    const cmd = input.value.trim();
    input.removeEventListener('keyup', handleTabComplete);
    input.disabled = true;
    input.style.display = 'none';

    const promptLine = input.parentElement;
    const promptText = promptLine.querySelector('.cmd-prompt').textContent;

    if (cmd) {
      commandHistory.push(cmd);
      historyIndex = commandHistory.length;

      promptLine.innerHTML = `<span style="color:var(--accent-green)">${promptText}</span> <span style="color:var(--text-primary)">${escapeHtml(cmd)}</span>`;

      const startTime = performance.now();
      processCommand(cmd, () => {
        const endTime = performance.now();
        const duration = (endTime - startTime).toFixed(0);
        setTimeout(() => {
          addOutput(`<span class="dim">[Completed in ${duration}ms]</span>`);
          addOutput('');
          addPrompt();
          isProcessing = false;
        }, 100);
      });
    } else {
      promptLine.remove();
      addPrompt();
      isProcessing = false;
    }
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    if (historyIndex > 0) {
      historyIndex--;
      e.target.value = commandHistory[historyIndex];
    }
  } else if (e.key === 'ArrowDown') {
    e.preventDefault();
    if (historyIndex < commandHistory.length - 1) {
      historyIndex++;
      e.target.value = commandHistory[historyIndex];
    } else {
      historyIndex = commandHistory.length;
      e.target.value = '';
    }
  } else if (e.key === 'Tab') {
    e.preventDefault();
    autoComplete(e.target);
  } else if (e.key === 'c' && e.ctrlKey) {
    e.preventDefault();
    const input = e.target;
    const currentValue = input.value;
    const promptText = input.parentElement.querySelector('.cmd-prompt').textContent;

    const echoLine = document.createElement('div');
    echoLine.className = 'cmd-output';
    echoLine.innerHTML = `<span style="color:var(--accent-green)">${promptText}</span> <span style="color:var(--text-primary)">${escapeHtml(currentValue)}</span> <span style="color:var(--accent-magenta)">^C</span>`;
    homeTerminal.insertBefore(echoLine, input.parentElement);

    input.value = '';
  } else if (e.key === 'l' && e.ctrlKey) {
    e.preventDefault();
    homeTerminal.innerHTML = '';
    addPrompt();
  }
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function autoComplete(input) {
  const value = input.value.toLowerCase().trim();
  if (!value) return;

  const commands = ['help', 'random', 'search', 'stats', 'clear', 'whoami', 'date', 'pwd', 'ls', 'cat'];
  const matches = commands.filter(cmd => cmd.startsWith(value));
  if (matches.length === 1) {
    input.value = matches[0];
  } else if (matches.length > 1) {
    const promptText = input.parentElement.querySelector('.cmd-prompt').textContent;
    addOutput(`<span style="color:var(--accent-green)">${promptText}</span> <span style="color:var(--text-primary)">${escapeHtml(value)}</span>`);
    addOutput(matches.join('  '));
  }
}

let currentMirrorChapter = 0;
let isReadingMirrorStory = false;

function initExhibition() {
  const container = document.getElementById('storyTerminal');
  container.innerHTML = '';

  // Command echo
  const cmd = document.createElement('div');
  cmd.className = 'story-cmd';
  cmd.innerHTML = '<span class="highlight">> Loading StarryMiu story data...</span>';
  container.appendChild(cmd);

  const cmd2 = document.createElement('div');
  cmd2.className = 'story-cmd';
  cmd2.innerHTML = '> Found ' + storyChapters.length + ' chapters. Rendering...';
  container.appendChild(cmd2);

  // Chapter navigation
  const nav = document.createElement('div');
  nav.className = 'story-nav';
  nav.id = 'storyNav';
  storyChapters.forEach((ch, idx) => {
    const btn = document.createElement('button');
    btn.className = 'story-nav-btn' + (idx === 0 ? ' active' : '');
    btn.textContent = '[ ' + ch.title + ' ]';
    btn.addEventListener('click', () => switchChapter(idx));
    nav.appendChild(btn);
  });
  container.appendChild(nav);

  // Divider
  const divider = document.createElement('div');
  divider.className = 'story-divider';
  divider.textContent = '─'.repeat(60);
  container.appendChild(divider);

  // Story content area
  const storyArea = document.createElement('div');
  storyArea.id = 'storyContent';
  storyArea.style.minHeight = '350px';
  container.appendChild(storyArea);

  // Bottom cursor (static, not input)
  const cursor = document.createElement('div');
  cursor.className = 'cmd-output dim';
  cursor.style.marginTop = '1rem';
  cursor.innerHTML = '  [EOF] - starry_miu@nft-terminal:~$ <span class="typing-cursor"></span>';
  container.appendChild(cursor);

  renderChapter(0);
}

function addStoryInput(container) {
  const line = document.createElement('div');
  line.className = 'cmd-line';
  line.innerHTML = `<span class="cmd-prompt">starry_miu@nft:~$</span>`;
  const input = document.createElement('input');
  input.className = 'cmd-input';
  input.setAttribute('autocomplete', 'off');
  input.setAttribute('autocorrect', 'off');
  input.setAttribute('autocapitalize', 'off');
  input.setAttribute('spellcheck', 'false');
  input.setAttribute('placeholder', '');
  input.style.caretColor = 'var(--accent-cyan)';
  input.addEventListener('keydown', handleStoryCommand);
  line.appendChild(input);
  
  // Remove any existing input before adding
  const existingInput = container.querySelector('.cmd-input');
  if (existingInput) {
    existingInput.parentElement.remove();
  }
  
  container.appendChild(line);
  input.focus();
}

function handleStoryCommand(e) {
  if (e.key === 'Enter') {
    const input = e.target;
    const cmd = input.value.trim();
    if (!cmd) return;
    
    const container = document.getElementById('storyTerminal');
    const storyArea = document.getElementById('storyContent');
    
    // Process command
    processStoryCommand(cmd);
    
    input.value = '';
    input.focus();
    container.scrollTop = container.scrollHeight;
  }
}

function processStoryCommand(cmd) {
  const container = document.getElementById('storyTerminal');
  const storyArea = document.getElementById('storyContent');
  
  if (cmd === '开始阅读') {
    isReadingMirrorStory = true;
    currentMirrorChapter = 0;
    showMirrorChapterInStory(storyArea, currentMirrorChapter);
  } else if (cmd === '下一章') {
    if (!isReadingMirrorStory) {
      addStoryOutput(container, '<span class="pink">请先输入「开始阅读」开启镜界故事</span>');
    } else if (currentMirrorChapter < mirrorChapters.length - 1) {
      currentMirrorChapter++;
      showMirrorChapterInStory(storyArea, currentMirrorChapter);
    } else {
      addStoryOutput(container, '<span class="highlight">已到达故事末尾</span>');
      addStoryOutput(container, '<span class="dim">输入「查看角色」查看主要角色表</span>');
    }
  } else if (cmd === '查看角色') {
    storyArea.innerHTML = '';
    const title = document.createElement('div');
    title.className = 'story-chapter-title';
    title.innerHTML = '<span class="ch-num">[角色]</span>镜界·人魔之战 - 主要角色表';
    storyArea.appendChild(title);
    
    const textEl = document.createElement('div');
    textEl.className = 'story-text';
    textEl.innerHTML = mirrorCharacterTable.replace(/\|/g, '<span style="color:var(--text-dim)">|</span>');
    storyArea.appendChild(textEl);
  } else {
    addStoryOutput(container, `<span class="pink">未知命令: ${cmd}</span>`);
    addStoryOutput(container, '<span class="dim">输入「开始阅读」开启镜界故事</span>');
  }
}

function addStoryOutput(container, html) {
  const output = document.createElement('div');
  output.className = 'cmd-output';
  output.innerHTML = html;
  const inputLine = container.querySelector('.cmd-line');
  container.insertBefore(output, inputLine);
}

function showMirrorChapterInStory(storyArea, chapterIndex) {
  const chapter = mirrorChapters[chapterIndex];
  if (!chapter) return;
  
  storyArea.innerHTML = '';
  
  const title = document.createElement('div');
  title.className = 'story-chapter-title';
  title.innerHTML = '<span class="ch-num">[' + String(chapterIndex).padStart(2,'0') + ']</span>镜界·人魔之战 - ' + chapter.title;
  storyArea.appendChild(title);
  
  const textEl = document.createElement('div');
  textEl.className = 'story-text';
  storyArea.appendChild(textEl);
  
  // Typewriter effect
  let charIdx = 0;
  const fullText = chapter.text;
  
  if (typewriterTimer) { 
    clearInterval(typewriterTimer); 
    typewriterTimer = null; 
  }
  
  typewriterTimer = setInterval(() => {
    if (charIdx < fullText.length) {
      // Add 1 char at a time for typewriter effect
      const chunk = fullText.substring(charIdx, charIdx + 1);
      textEl.textContent += chunk;
      charIdx++;
      // Auto scroll
      storyArea.scrollTop = storyArea.scrollHeight;
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
    }
  }, 30);
  
  // Click to skip typewriter
  textEl.addEventListener('click', () => {
    if (typewriterTimer) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      textEl.textContent = fullText;
    }
  });
}

function switchChapter(idx) {
  if (idx === currentChapter) return;
  currentChapter = idx;
  // Update nav buttons
  document.querySelectorAll('#storyNav .story-nav-btn').forEach((btn, i) => {
    btn.classList.toggle('active', i === idx);
  });
  renderChapter(idx);
  
  // Only show input for Mirror World chapter (index 4)
  const container = document.getElementById('storyTerminal');
  const existingInput = container.querySelector('.cmd-input');
  const existingCursor = container.querySelector('.typing-cursor').parentElement;
  
  if (idx === 4) {
    // Mirror World chapter - show input, hide cursor
    if (existingCursor && !existingCursor.classList.contains('cmd-line')) {
      existingCursor.remove();
    }
    if (!existingInput) {
      addStoryInput(container);
    }
  } else {
    // Other chapters - hide/remove input, show cursor
    if (existingInput) {
      existingInput.parentElement.remove();
    }
    if (!container.querySelector('.typing-cursor')) {
      const cursor = document.createElement('div');
      cursor.className = 'cmd-output dim';
      cursor.style.marginTop = '1rem';
      cursor.innerHTML = '  [EOF] - starry_miu@nft-terminal:~$ <span class="typing-cursor"></span>';
      container.appendChild(cursor);
    }
  }
}

function renderChapter(idx) {
  if (typewriterTimer) { clearInterval(typewriterTimer); typewriterTimer = null; }
  const area = document.getElementById('storyContent');
  area.innerHTML = '';

  const ch = storyChapters[idx];

  // Chapter title
  const title = document.createElement('div');
  title.className = 'story-chapter-title';
  title.innerHTML = '<span class="ch-num">[' + String(idx).padStart(2,'0') + ']</span>' + ch.title;
  area.appendChild(title);

  // Typewriter effect for story text
  const textEl = document.createElement('div');
  textEl.className = 'story-text';
  area.appendChild(textEl);

  let charIdx = 0;
  const fullText = ch.text;
  typewriterTimer = setInterval(() => {
    if (charIdx < fullText.length) {
      // Add 3 chars at a time for speed
      const chunk = fullText.substring(charIdx, Math.min(charIdx + 3, fullText.length));
      textEl.textContent += chunk;
      charIdx += 3;
      // Auto scroll
      area.scrollTop = area.scrollHeight;
    } else {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
    }
  }, 30);

  // Click to skip typewriter
  textEl.addEventListener('click', () => {
    if (typewriterTimer) {
      clearInterval(typewriterTimer);
      typewriterTimer = null;
      textEl.textContent = fullText;
    }
  });
}

/* ========== VOTE PAGE ========== */
let currentVotePage = 1;

function getTop30() {

function renderVotePage(page) {
  currentVotePage = page;
  const container = document.getElementById('voteGrid');
  container.innerHTML = '';
  
  // 从availableNFTs数组中获取当前页的NFT（已排除销毁的）
  const startIdx = (page - 1) * PER_PAGE;
  const endIdx = Math.min(startIdx + PER_PAGE, availableNFTs.length);
  const pageNFTs = availableNFTs.slice(startIdx, endIdx);
  
  const firstId = pageNFTs.length > 0 ? pageNFTs[0] : '-';
  const lastId = pageNFTs.length > 0 ? pageNFTs[pageNFTs.length - 1] : '-';

  const info = document.createElement('div');
  info.className = 'cmd-output dim';
  info.textContent = ` > Displaying NFTs #${firstId} - #${lastId} (Page ${page}/${TOTAL_PAGES})`;
  container.appendChild(info);

  const grid = document.createElement('div');
  grid.className = 'nft-grid';
  
  for (const nftId of pageNFTs) {
    const wrap = document.createElement('div');
    const card = document.createElement('div');
    card.className = 'nft-card';
    
    // 使用新的createNFTImage函数创建图片（带懒加载和网关切换）
    const img = createNFTImage(nftId);
    card.appendChild(img);
    
    const idLabel = document.createElement('div');
    idLabel.className = 'nft-id';
    idLabel.textContent = `#${String(nftId).padStart(4,'0')}`;
    const btn = document.createElement('button');
    btn.className = 'vote-btn';
    btn.textContent = `投票 (${votes[nftId] || 0})`;
    btn.addEventListener('click', async () => {
      const success = await addVote(nftId);
      if (success) {
        btn.textContent = `投票 (${votes[nftId]})`;
        btn.style.borderColor = 'var(--accent-magenta)';
        btn.style.color = 'var(--accent-magenta)';
        setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 600);
      } else {
        btn.style.borderColor = '#ff3333';
        btn.style.color = '#ff3333';
        setTimeout(() => { btn.style.borderColor = ''; btn.style.color = ''; }, 600);
      }
    });
    wrap.appendChild(card);
    wrap.appendChild(idLabel);
    wrap.appendChild(btn);
    grid.appendChild(wrap);
  }
  container.appendChild(grid);

  // 更新固定命令行中的页码
  document.getElementById('votePageLabel').textContent = page;
  document.getElementById('voteTotalPages').textContent = TOTAL_PAGES;
  document.getElementById('voteCmdPage').textContent = page;
  renderPagination();
}

function renderPagination() {
  const container = document.getElementById('votePagination');
  container.innerHTML = '';

  // "上一页" as text link
  const prevBtn = document.createElement('button');
  prevBtn.className = 'page-btn nav-arrow';
  prevBtn.textContent = '上一页';
  prevBtn.disabled = currentVotePage === 1;
  prevBtn.addEventListener('click', () => { if (currentVotePage > 1) renderVotePage(currentVotePage - 1); });
  container.appendChild(prevBtn);

  // Build page numbers: first page, current page, last page, with ... between
  const pages = [];
  pages.push(1);
  if (currentVotePage !== 1 && currentVotePage !== TOTAL_PAGES) {
    pages.push(currentVotePage);
  }
  if (TOTAL_PAGES > 1) pages.push(TOTAL_PAGES);

  for (let i = 0; i < pages.length; i++) {
    const p = pages[i];
    // Add ... before this page if there's a gap
    if (i > 0 && p - pages[i - 1] > 1) {
      const dots = document.createElement('span');
      dots.className = 'page-info';
      dots.textContent = '...';
      container.appendChild(dots);
    }
    addPageBtn(container, p);
  }

  // "下一页" as text link
  const nextBtn = document.createElement('button');
  nextBtn.className = 'page-btn nav-arrow';
  nextBtn.textContent = '下一页';
  nextBtn.disabled = currentVotePage === TOTAL_PAGES;
  nextBtn.addEventListener('click', () => { if (currentVotePage < TOTAL_PAGES) renderVotePage(currentVotePage + 1); });
  container.appendChild(nextBtn);
}

function addPageBtn(container, p) {
  const btn = document.createElement('button');
  btn.className = 'page-btn' + (p === currentVotePage ? ' active' : '');
  btn.textContent = p;
  btn.addEventListener('click', () => renderVotePage(p));
  container.appendChild(btn);
}
